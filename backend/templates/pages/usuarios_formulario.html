{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulario Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: "Courier New", monospace;
            padding-top: 2rem;
        }

        .cyber-card {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
            padding: 2.5rem;
        }

        input, select {
            background-color: #121212 !important;
            border: 1px solid #333 !important;
            color: #00ff41 !important;
            border-radius: 0 !important;
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10 cyber-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="m-0">// REGISTRO_USUARIO</h1>
                    <a class="btn btn-outline-info" href="{% url 'usuarios_lista' %}">VER_USUARIOS</a>
                </div>

                <div id="form-alert" class="alert bg-dark text-danger border-danger" style="display:none"></div>

                <form id="usuario-form" method="POST">
                    {% csrf_token %}
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label>Tipo documento</label>
                            <select name="tipo_documento" class="form-select" required>
                                <option value="CC">Cedula</option>
                                <option value="CE">Cedula extranjeria</option>
                                <option value="TI">Tarjeta identidad</option>
                                <option value="PAS">Pasaporte</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label>Numero documento</label>
                            <input type="text" name="numero_documento" class="form-control" required />
                        </div>
                        <div class="col-md-12">
                            <label>Nombre completo</label>
                            <input type="text" name="nombre_completo" class="form-control" required />
                        </div>
                        <div class="col-md-4">
                            <label>Tipo usuario</label>
                            <select name="tipo_usuario" id="tipo-usuario" class="form-select" required>
                                <option value="atleta">Atleta</option>
                                <option value="arbitro">Arbitro</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>Edad</label>
                            <input type="number" name="edad" id="edad" class="form-control" min="1" required />
                        </div>
                        <div class="col-md-4">
                            <label>Sexo</label>
                            <select name="sexo" class="form-select" required>
                                <option value="M">Masculino</option>
                                <option value="F">Femenino</option>
                                <option value="O">Otro</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label>Username</label>
                            <input type="text" name="username" class="form-control" required />
                        </div>
                        <div class="col-md-12">
                            <label>Direccion</label>
                            <input type="text" name="direccion" class="form-control" required />
                        </div>
                        <div class="col-md-12">
                            <label>Password</label>
                            <input type="password" name="password" class="form-control" required />
                        </div>
                        <div class="col-md-12" id="equipo-section">
                            <label>Equipo</label>
                            <input
                                type="text"
                                name="equipo_nombre_input"
                                id="equipo-nombre-input"
                                class="form-control"
                                list="equipos-lista"
                                placeholder="Escribe o selecciona un equipo"
                            />
                            <input type="hidden" name="equipo_id" id="equipo-id">
                            <datalist id="equipos-lista">
                                {% for equipo in equipos %}
                                <option value="{{ equipo.nombre }}" data-id="{{ equipo.id }}"></option>
                                {% endfor %}
                            </datalist>
                            <small class="text-secondary">Puedes escribir un equipo existente o uno nuevo.</small>
                        </div>
                    </div>

                    <div class="mt-4 p-3 border border-info">
                        <h3 class="mb-3">// TELEFONOS</h3>
                        <div id="phones-container" class="mb-3"></div>
                        <div class="row g-2">
                            <div class="col-4">
                                <select id="phone-type" class="form-select">
                                    <option value="Movil">Movil</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Trabajo">Trabajo</option>
                                </select>
                            </div>
                            <div class="col-5">
                                <input type="text" id="phone-number" class="form-control" placeholder="Numero">
                            </div>
                            <div class="col-3">
                                <button type="button" id="add-phone-btn" class="btn btn-outline-info w-100">Agregar</button>
                            </div>
                        </div>
                    </div>

                    <div id="acudiente-section" class="mt-4 p-3 border border-warning" style="display:none;">
                        <h3 class="mb-3">// DATOS_ACUDIENTE</h3>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label>Nombre completo</label>
                                <input type="text" name="acudiente_nombre_completo" class="form-control">
                            </div>
                            <div class="col-md-3">
                                <label>Tipo documento</label>
                                <select name="acudiente_tipo_documento" class="form-select">
                                    <option value="CC">Cedula</option>
                                    <option value="CE">Cedula extranjeria</option>
                                    <option value="TI">Tarjeta identidad</option>
                                    <option value="PAS">Pasaporte</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label>Numero documento</label>
                                <input type="text" name="acudiente_numero_documento" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label>Telefono</label>
                                <input type="text" name="acudiente_telefono" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label>Parentesco</label>
                                <input type="text" name="acudiente_parentesco" class="form-control" placeholder="Madre, padre, tutor...">
                            </div>
                            <div class="col-md-4">
                                <label>Direccion</label>
                                <input type="text" name="acudiente_direccion" class="form-control">
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-success w-100">GUARDAR_USUARIO</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="{% static 'js/api.js' %}"></script>
    <script src="{% static 'js/telefonos.js' %}"></script>
    <script src="{% static 'js/usuarios.js' %}"></script>
</body>
</html>
