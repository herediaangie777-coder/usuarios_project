<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SISTEMA_ESPORTS // DETALLE_USUARIO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/material.css" />

    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --bg-dark: #050505;
            --terminal-green: #00ff41;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            padding-top: 2rem;
        }

        .cyber-card {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        h1, h2 {
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--neon-magenta);
            padding-bottom: 10px;
        }

        .label-magenta {
            color: var(--neon-magenta);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .data-value {
            color: var(--terminal-green);
            font-size: 1.1rem;
        }

        .btn-cyber {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            border-radius: 0;
            transition: 0.3s;
        }

        .btn-cyber:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        input, select {
            background-color: #121212 !important;
            border: 1px solid #333 !important;
            color: var(--terminal-green) !important;
            border-radius: 0 !important;
        }
    </style>
</head>
<body>
    <main class="container" id="usuario-detalle">
        <h1 class="mb-4">// DETALLE_DE_USUARIO</h1>
        
        <div class="actions mb-4">
            <a class="btn btn-cyber" href="/{% url 'usuarios_lista' %}">< VOLVER_A_LISTA</a>
        </div>

        <div id="detalle-alert" class="alert bg-dark text-danger border-danger" style="display:none"></div>

        <div class="row">
            <div class="col-md-6">
                <div class="cyber-card">
                    <h2 id="detalle-nombre" class="h4">NOMBRE_USUARIO</h2>
                    <hr class="border-secondary">
                    <p><strong class="label-magenta">DOCUMENTO:</strong> <span id="detalle-documento" class="data-value"></span></p>
                    <p><strong class="label-magenta">USERNAME:</strong> <span id="detalle-username" class="data-value"></span></p>
                    <p><strong class="label-magenta">DIRECCIÓN:</strong> <span id="detalle-direccion" class="data-value"></span></p>
                </div>
            </div>

            <div class="col-md-6">
                <div class="cyber-card">
                    <h2 class="h4">// TERMINALES_REGISTRADAS</h2>
                    <div id="telefonos-list" class="phone-list my-3">
                        </div>
                </div>

                <div class="cyber-card mt-3">
                    <h2 class="h4">// VINCULAR_NUEVO_TEL</h2>
                    <form id="telefono-form" class="row g-2 mt-2">
                        <div class="col-6">
                            <label class="label-magenta">NÚMERO</label>
                            <input type="text" name="numero" class="form-control" required />
                        </div>
                        <div class="col-6">
                            <label class="label-magenta">TIPO</label>
                            <select name="tipo" class="form-select" required>
                                <option value="movil">Móvil</option>
                                <option value="fijo">Fijo</option>
                                <option value="trabajo">Trabajo</option>
                            </select>
                        </div>
                        <div class="col-12 mt-3">
                            <button type="submit" class="btn btn-cyber w-100">EJECUTAR_VINCULACIÓN</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="../../js/api.js"></script>
    <script src="../../js/telefonos.js"></script>
    <script src="../../js/usuarios.js"></script>
</body>
</html>
