
<style>
#erd { width: 100%; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    primaryBorderColor: dark ? '#7F77DD' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryTextColor: dark ? '#9FE1CB' : '#085041',
    secondaryBorderColor: dark ? '#1D9E75' : '#0F6E56',
    tertiaryColor: dark ? '#444441' : '#F1EFE8',
    tertiaryTextColor: dark ? '#D3D1C7' : '#444441',
    tertiaryBorderColor: dark ? '#888780' : '#5F5E5A',
    noteBkgColor: dark ? '#26215C' : '#EEEDFE',
    noteTextColor: dark ? '#CECBF6' : '#26215C',
  },
});

const diagram = `classDiagram
  class Usuario {
    -int codigoId
    -String tipoDocumento
    -String numeroDocumento
    -String nombreCompleto
    -int edad
    -String sexo
    -String comuna
    -String barrio
    -String direccionDomicilio
    -String nickName
    -String contrasena
    -String tipoUsuario
    -String contactoTelefono
    -String redSocial
    +getCodigoId() int
    +setCodigoId(int)
    +getTipoDocumento() String
    +setTipoDocumento(String)
    +getNumeroDocumento() String
    +setNumeroDocumento(String)
    +getNombreCompleto() String
    +setNombreCompleto(String)
    +getEdad() int
    +setEdad(int)
    +getSexo() String
    +setSexo(String)
    +getComuna() String
    +setComuna(String)
    +getBarrio() String
    +setBarrio(String)
    +getDireccionDomicilio() String
    +setDireccionDomicilio(String)
    +getNickName() String
    +setNickName(String)
    +getContrasena() String
    +setContrasena(String)
    +getTipoUsuario() String
    +setTipoUsuario(String)
    +getContactoTelefono() String
    +setContactoTelefono(String)
    +getRedSocial() String
    +setRedSocial(String)
    +crearUsuario()
    +actualizarUsuario()
    +asignarLogro(trofeo)
  }

  class Atleta {
    -int codigoId_FK
    -int puntosExperiencia
    -int codigoEquipo_FK
    +getCodigoId() int
    +getPuntosExperiencia() int
    +setPuntosExperiencia(int)
    +getCodigoEquipo() int
    +setCodigoEquipo(int)
    +asociarEquipo(equipo)
    +acumularPuntosExperiencia(horas)
  }

  class Arbitro {
    -int codigoId_FK
    +getCodigoId() int
  }

  class Administrativo {
    -int codigoId_FK
    +getCodigoId() int
  }

  class Proveedor {
    -int codigoId_FK
    +getCodigoId() int
  }

  class AcudienteMinor {
    -int codigoId_FK
    -String nombrePadre
    -String telefonoPadre
    +getCodigoId() int
    +getNombrePadre() String
    +setNombrePadre(String)
    +getTelefonoPadre() String
    +setTelefonoPadre(String)
  }

  class EquipoJuego {
    -int codigoId
    -String nombre
    -String horasJuego
    -int nivelEquipo
    -int codigoJuego_FK
    -List~Atleta~ jugadoresEquipo
    +getCodigoId() int
    +getNombre() String
    +setNombre(String)
    +getHorasJuego() String
    +setHorasJuego(String)
    +getNivelEquipo() int
    +setNivelEquipo(int)
    +getCodigoJuego() int
    +setCodigoJuego(int)
    +getJugadoresEquipo() List~Atleta~
    +setJugadoresEquipo(List~Atleta~)
    +crearEquipo()
    +actualizarEquipo()
    +calcularNivel()
    +acumularPuntosExperiencia(horas)
    +asignarPersona(atleta)
    +asignarTrofeo(trofeo)
  }

  class Trofeo {
    -int codigoId
    -String nombre
    -int puntos
    -int codigoJuego_FK
    -int codigoEquipo_FK
    +getCodigoId() int
    +getNombre() String
    +setNombre(String)
    +getPuntos() int
    +setPuntos(int)
    +getCodigoJuego() int
    +setCodigoJuego(int)
    +getCodigoEquipo() int
    +setCodigoEquipo(int)
    +crearTrofeo()
    +actualizarTrofeo()
  }

  class Juego {
    -int codigoId
    -String nombre
    -String calificacionESRB
    -String estudioDesarrollador
    -int numeroJugadores
    -String tipo
    -int totalExistencias
    +getCodigoId() int
    +getNombre() String
    +setNombre(String)
    +getCalificacionESRB() String
    +setCalificacionESRB(String)
    +getEstudioDesarrollador() String
    +setEstudioDesarrollador(String)
    +getNumeroJugadores() int
    +setNumeroJugadores(int)
    +getTipo() String
    +setTipo(String)
    +getTotalExistencias() int
    +setTotalExistencias(int)
    +crearJuego()
    +actualizarJuego()
  }

  class Plataforma {
    -int codigoId
    -String nombre
    -String marca
    +getCodigoId() int
    +getNombre() String
    +setNombre(String)
    +getMarca() String
    +setMarca(String)
    +crearPlataforma()
    +actualizarPlataforma()
  }

  class JuegoPlataforma {
    -int codigoJuego_FK
    -int codigoPlataforma_FK
    +getCodigoJuego() int
    +setCodigoJuego(int)
    +getCodigoPlataforma() int
    +setCodigoPlataforma(int)
  }

  class Hardware {
    -int codigoId
    -String numeroSerie
    -String nombre
    -int codigoPlataforma_FK
    +getCodigoId() int
    +getNumeroSerie() String
    +setNumeroSerie(String)
    +getNombre() String
    +setNombre(String)
    +getCodigoPlataforma() int
    +setCodigoPlataforma(int)
  }

  class Consola {
    -int codigoId_FK
    -int totalExistentes
    -String direccionIP
    -String direccionMACUTP5
    -String direccionMACWireless
    -int totalControles
    +getCodigoId() int
    +getTotalExistentes() int
    +setTotalExistentes(int)
    +getDireccionIP() String
    +setDireccionIP(String)
    +getDireccionMACUTP5() String
    +setDireccionMACUTP5(String)
    +getDireccionMACWireless() String
    +setDireccionMACWireless(String)
    +getTotalControles() int
    +setTotalControles(int)
    +crearConsola()
    +actualizarConsola()
  }

  class Control {
    -int codigoId_FK
    -String tipoControl
    +getCodigoId() int
    +getTipoControl() String
    +setTipoControl(String)
    +crearControl()
    +actualizarControl()
  }

  class SesionEntrenamiento {
    -int codigoId
    -Date fechaAgendamiento
    -Time horaInicio
    -Time horaFinalizacion
    -String estado
    -int puntosExperiencia
    -int codigoAtleta_FK
    -int codigoEquipo_FK
    -int codigoJuego_FK
    -int codigoArbitro_FK
    +getCodigoId() int
    +getFechaAgendamiento() Date
    +setFechaAgendamiento(Date)
    +getHoraInicio() Time
    +setHoraInicio(Time)
    +getHoraFinalizacion() Time
    +setHoraFinalizacion(Time)
    +getEstado() String
    +setEstado(String)
    +getPuntosExperiencia() int
    +setPuntosExperiencia(int)
    +getCodigoAtleta() int
    +setCodigoAtleta(int)
    +getCodigoEquipo() int
    +setCodigoEquipo(int)
    +getCodigoJuego() int
    +setCodigoJuego(int)
    +getCodigoArbitro() int
    +setCodigoArbitro(int)
    +agendarSesion()
    +cancelarSesion()
    +cerrarSesion()
    +calcularHorasEntrenadas()
  }

  Usuario <|-- Atleta
  Usuario <|-- Arbitro
  Usuario <|-- Administrativo
  Usuario <|-- Proveedor
  Usuario <|-- AcudienteMinor

  Atleta "0..*" --> "0..1" EquipoJuego : codigoEquipo_FK
  Atleta "0..*" --> "0..*" Trofeo : posee

  EquipoJuego "1" --> "1" Juego : codigoJuego_FK
  EquipoJuego "0..*" --> "0..*" Trofeo : gana

  Trofeo "0..*" --> "1" Juego : codigoJuego_FK

  Juego "1" --> "1..*" JuegoPlataforma : disponible en
  Plataforma "1" --> "1..*" JuegoPlataforma : tiene

  Hardware <|-- Consola
  Hardware <|-- Control
  Hardware "0..*" --> "1" Plataforma : codigoPlataforma_FK

  SesionEntrenamiento "0..*" --> "0..1" Atleta : codigoAtleta_FK
  SesionEntrenamiento "0..*" --> "0..1" EquipoJuego : codigoEquipo_FK
  SesionEntrenamiento "0..*" --> "1" Juego : codigoJuego_FK
  SesionEntrenamiento "0..*" --> "1" Arbitro : codigoArbitro_FK
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
</script>
